<html>

<head>
    <meta charset="utf-8" />
    <script type="text/javascript">
        // Function을 이용하여 이름, 나이를 출력하기
        function myInfo(name, age) {
            document.write("이름 : " + name + "<br/>");
            document.write("나이 : 만{ " + age + " }세<br/>");
        }

        var myName = "이명휘";
        var myAge = 20;

        myInfo(myName, myAge);
        myInfo('김상률', 24);
        myInfo('유근호', 27);
    </script>
</head>

<body>

</body>

</html>
