<html>

<head>
    <meta charset="utf-8" />
    <script type="text/javascript">
        // While문을 이용하여 본인의 이름을 7번 출력시키기
        var i = 0;
        while (i < 7) {
            document.write((i + 1) + " -> 이명휘<br/>");
            i = i + 1;
        }

    </script>
</head>

</body>

</html>
